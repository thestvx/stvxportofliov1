<style>
:root {
  --gold: #FAC752;
  --bg: #050505;
  --text: #f5f5f5;
  --dim: rgba(255,255,255,.4);
  --ease: cubic-bezier(.16,1,.3,1);
  --ease-out: cubic-bezier(.22,1,.36,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
  cursor: none;
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--gold); color: #000; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
a { text-decoration: none; color: inherit; }

/* NOISE */
.noise {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9998;
  opacity: .025;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 128px;
}

/* ===== ENTRY GATE / LOADER ===== */
#entryGate {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 99999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 1.2s var(--ease), visibility 1.2s;
}
#entryGate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
.gate-logo {
  opacity: 0; transform: scale(.85);
  cursor: none;
  position: relative; z-index: 10;
  padding: 20px;
}
.gate-logo img {
  width: 180px; height: auto;
  filter: drop-shadow(0 0 60px rgba(250,199,82,.3));
  transition: transform .5s var(--ease), filter .5s var(--ease);
}
.gate-logo:hover img {
  transform: scale(1.08);
  filter: drop-shadow(0 0 80px rgba(250,199,82,.5));
}
.gate-logo.pulse img {
  animation: logoPulse 1.6s ease-in-out infinite;
}
@keyframes logoPulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 60px rgba(250,199,82,.3)); }
  50% { transform: scale(1.06); filter: drop-shadow(0 0 90px rgba(250,199,82,.55)); }
}
/* Spiral loader */
.gate-spiral-wrap {
  margin-top: 2.8rem;
  width: 80px; height: 80px;
  position: relative;
}
.gate-spiral-svg {
  width: 80px; height: 80px;
  transform: rotate(-90deg);
}
.gate-spiral-track {
  fill: none;
  stroke: rgba(255,255,255,.04);
  stroke-width: 1.5;
}
.gate-spiral-fill {
  fill: none;
  stroke: var(--gold);
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-dasharray: 220;
  stroke-dashoffset: 220;
  transition: stroke-dashoffset .35s ease;
  filter: drop-shadow(0 0 6px rgba(250,199,82,.4));
}
.gate-counter {
  margin-top: 1.2rem;
  font-size: .45rem; letter-spacing: .4em;
  color: var(--gold); opacity: .4;
}
.gate-hint {
  margin-top: 1.6rem;
  font-size: .5rem; letter-spacing: .3em;
  text-transform: uppercase;
  color: rgba(255,255,255,.15);
  opacity: 0;
  transition: opacity .6s ease;
}
.gate-hint.visible { opacity: 1; }

/* Orange curtain */
#orangeCurtain {
  position: fixed; inset: 0;
  background: var(--gold);
  z-index: 99998;
  transform: translateY(100%);
  pointer-events: none;
}

/* ===== PROGRESS BAR ===== */
.scroll-progress {
  position: fixed; top: 0; left: 0;
  width: 0; height: 1px;
  background: var(--gold);
  z-index: 1000;
  transition: width .1s linear;
}

/* ===== CURSOR ===== */
.cursor-wrap {
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 100000;
  transform: translate(-50%, -50%);
  will-change: transform;
  transition: transform .08s linear;
}
.cursor-img {
  width: 32px; height: 32px;
  object-fit: contain;
  pointer-events: none;
  filter: drop-shadow(0 0 3px rgba(255,255,255,.6)) drop-shadow(0 0 8px rgba(250,199,82,.3));
  transition: transform .35s var(--ease), filter .35s var(--ease);
}
.cursor-wrap.hover .cursor-img {
  transform: scale(1.4);
  filter: drop-shadow(0 0 6px rgba(255,255,255,.8)) drop-shadow(0 0 14px rgba(250,199,82,.6));
}
@media(max-width: 768px) {
  .cursor-wrap { display: none; }
  body { cursor: auto; }
}

/* ===== NAV ===== */
nav {
  position: fixed; top: 0; left: 0; width: 100%;
  z-index: 100;
  padding: 2rem 3rem;
  display: flex; justify-content: space-between; align-items: center;
  transition: all .6s var(--ease);
  mix-blend-mode: difference;
}
nav.scrolled { padding: 1.2rem 3rem; }
nav.hidden-nav { transform: translateY(-120%); }
.logo img { width: 70px; height: auto; display: block; }
.nav-links { display: flex; gap: 2.4rem; list-style: none; }
.nav-links a {
  font-size: .55rem; letter-spacing: .22em;
  text-transform: uppercase;
  opacity: .4;
  transition: opacity .35s ease;
  position: relative;
}
.nav-links a::after {
  content: ''; position: absolute;
  bottom: -4px; left: 0;
  width: 0; height: 1px;
  background: var(--gold);
  transition: width .4s var(--ease);
}
.nav-links a:hover { opacity: 1; }
.nav-links a:hover::after { width: 100%; }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.nav-cta {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .55rem 1.2rem;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 999px;
  background: rgba(250,199,82,.03);
  backdrop-filter: blur(14px);
  color: var(--gold);
  font-size: .5rem; font-weight: 600;
  letter-spacing: .2em; text-transform: uppercase;
  transition: all .4s var(--ease);
}
.nav-cta:hover {
  background: rgba(250,199,82,.12);
  border-color: rgba(250,199,82,.28);
  box-shadow: 0 0 50px rgba(250,199,82,.1);
}
/* Sound toggle */
.sound-toggle {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .55rem .9rem;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 999px;
  background: rgba(250,199,82,.03);
  backdrop-filter: blur(14px);
  color: var(--dim);
  font-size: .5rem; letter-spacing: .15em;
  text-transform: uppercase;
  cursor: none;
  transition: all .4s var(--ease);
  user-select: none;
}
.sound-toggle:hover {
  border-color: rgba(250,199,82,.18);
  color: var(--gold);
}
.sound-toggle .bars { display: inline-flex; gap: 2px; align-items: flex-end; height: 10px; }
.sound-toggle .bar {
  width: 2px; background: currentColor; border-radius: 1px;
  transition: height .3s ease;
}
.sound-toggle .bar:nth-child(1) { height: 4px; }
.sound-toggle .bar:nth-child(2) { height: 7px; }
.sound-toggle .bar:nth-child(3) { height: 5px; }
.sound-toggle .bar:nth-child(4) { height: 9px; }
.sound-toggle.muted .bar { height: 2px !important; }
@media(max-width: 768px) {
  nav { padding: 1.2rem 1.4rem; }
  .nav-links { display: none; }
  .logo img { width: 50px; }
}

.hero {

.hero-bottom {

/* FOOTER */

<script>
;(function(){
  /* ===== AUDIO ENGINE ===== */
  var audioEntry = new Audio();
  audioEntry.src = 'backgroundmusic1.mp3';
  audioEntry.preload = 'auto';
  audioEntry.loop = true;
  audioEntry.volume = 0;
  var audioMain = new Audio();
  audioMain.src = 'backgroundmusic2.mp3';
  audioMain.preload = 'auto';
  audioMain.loop = true;
  audioMain.volume = 0;
  var sfxClick = new Audio();
  sfxClick.src = 'click.mp3';
  sfxClick.preload = 'auto';
  sfxClick.volume = 0.5;
  var sfxSwap = new Audio();
  sfxSwap.src = 'swap.mp3';
  sfxSwap.preload = 'auto';
  sfxSwap.volume = 0.6;
  var soundMuted = false;

  function playClick() {
    if (soundMuted) return;
    sfxClick.currentTime = 0;
    sfxClick.play().catch(function(){});
  }

  function playEntryMusic() {
    if (soundMuted) return;
    audioEntry.play().catch(function(){});
    gsap.to(audioEntry, { volume: 0.35, duration: 1.5 });
  }

  function fadeOutEntry(callback) {
    gsap.to(audioEntry, { volume: 0, duration: 0.5, onComplete: function() {
      audioEntry.pause();
      if (callback) callback();
    }});
  }

  function fadeInBackground() {
    if (soundMuted) return;
    audioMain.currentTime = 0;
    audioMain.play().catch(function(){});
    gsap.to(audioMain, { volume: 0.3, duration: 1 });
  }

  /* ===== CLICK SOUND ON EVERY CLICK ===== */
  document.addEventListener('click', function(e) {
    playClick();
  });

  /* ===== SOUND TOGGLE ===== */
  var soundToggle = document.getElementById('soundToggle');
  soundToggle.addEventListener('click', function(e) {
    e.stopPropagation();
    soundMuted = !soundMuted;
    soundToggle.classList.toggle('muted', soundMuted);
    if (soundMuted) {
      gsap.to(audioEntry, { volume: 0, duration: 0.5 });
      gsap.to(audioMain, { volume: 0, duration: 0.5 });
    } else {
      if (!audioEntry.paused && audioEntry.currentTime > 0) {
        gsap.to(audioEntry, { volume: 0.35, duration: 0.5 });
      }
      if (!audioMain.paused && audioMain.currentTime > 0) {
        gsap.to(audioMain, { volume: 0.3, duration: 0.5 });
      }
    }
  });

  /* ===== ENTRY GATE ===== */
  var gateFill = document.getElementById('gateFill');
  var gateCounter = document.getElementById('gateCounter');
  var gateLogo = document.getElementById('gateLogo');
  var gateHint = document.getElementById('gateHint');
  var entryGate = document.getElementById('entryGate');
  var orangeCurtain = document.getElementById('orangeCurtain');
  var p = 0;
  var gateReady = false;
  var circumference = 2 * Math.PI * 35; /* ~220 */

  /* Start entry music on first user interaction (browser autoplay policy) */
  var musicStarted = false;
  function startEntryMusic() {
    if (musicStarted) return;
    musicStarted = true;
    playEntryMusic();
  }
  document.addEventListener('click', startEntryMusic, { once: true });
  document.addEventListener('mousemove', startEntryMusic, { once: true });

  /* Logo reveal */
  gsap.to(gateLogo, { opacity: 1, scale: 1, duration: .8, delay: .1, ease: 'power3.out' });

  /* Animate progress with spiral */
  function step(t) {
    function go() {
      if (p < t) {
        p++;
        var offset = circumference - (p / 100) * circumference;
        gateFill.style.strokeDashoffset = offset;
        gateCounter.textContent = p + '%';
        if (p < t) requestAnimationFrame(go);
        else if (p >= 100) onGateReady();
      }
    }
    go();
  }

  setTimeout(function() { step(40); }, 150);
  setTimeout(function() { step(75); }, 500);
  setTimeout(function() { step(100); }, 1000);

  /* Fallback: force gate ready after 2s no matter what */
  setTimeout(function() {
    if (!gateReady) onGateReady();
  }, 2000);

  function onGateReady() {
    gateReady = true;
    gateLogo.classList.add('pulse');
    gateHint.classList.add('visible');
  }

  /* Logo click = enter site */
  gateLogo.addEventListener('click', function(e) {
    e.stopPropagation();
    if (!gateReady) return;
    gateReady = false;
    gateLogo.classList.remove('pulse');

    /* Play click then swap SFX */
    playClick();
    setTimeout(function() {
      if (!soundMuted) {
        sfxSwap.currentTime = 0;
        sfxSwap.play().catch(function(){});
      }
    }, 80);

    /* Orange curtain rises from bottom */
    gsap.to(orangeCurtain, {
      y: 0,
      duration: 0.7,
      ease: 'power3.inOut',
      onComplete: function() {
        /* Fade out entry music */
        fadeOutEntry(function() {
          /* Start main music */
          fadeInBackground();
        });

        /* Hide gate behind curtain */
        entryGate.classList.add('hidden');

        /* Curtain rises up to reveal site */
        gsap.to(orangeCurtain, {
          y: '-100%',
          duration: 0.7,
          delay: 0.2,
          ease: 'power3.inOut',
          onComplete: function() {
            orangeCurtain.style.pointerEvents = 'none';
            window.scrollTo(0, 0);
            if (typeof lenis !== 'undefined') lenis.scrollTo(0, { immediate: true });
            heroReveal();
          }
        });
      }
    });
  });

  /* ===== HERO REVEAL ===== */
  function heroReveal() {
    var tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.to('.hero-logo', { opacity: 1, scale: 1, duration: 1.2, ease: 'power4.out' }, .1);
    tl.to('.hero-tagline', { opacity: 1, duration: .8 }, .3);
    tl.to('.hero-bottom', { opacity: 1, duration: .8 }, .6);
  }

  /* ===== LENIS — Ultra Smooth ===== */
  if (typeof Lenis !== 'undefined') {
    var lenis = new Lenis({
      duration: 2.4,
      easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -12 * t)); },
      smoothWheel: true,
      wheelMultiplier: .55,
      touchMultiplier: 1.5,
      infinite: false
    });
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add(function(t) { lenis.raf(t * 1000); });
    gsap.ticker.lagSmoothing(0);

    var last = 0;
    var nav = document.getElementById('nav');
    ScrollTrigger.create({
      start: 'top -80',
      onUpdate: function(self) {
        var c = self.scroll();
        nav.classList.toggle('hidden-nav', c > last && c > 200);
        nav.classList.toggle('scrolled', c > 80);
        last = c;
      }
    });
  }

  /* ===== SCROLL PROGRESS ===== */
  window.addEventListener('scroll', function() {
    var docH = document.documentElement.scrollHeight - window.innerHeight;
    var total = docH > 0 ? window.scrollY / docH : 0;
    document.getElementById('scrollProgress').style.width = (total * 100) + '%';
  });

  /* ===== CURSOR ===== */
  var wrap = document.querySelector('.cursor-wrap');
  var cursorImg = document.querySelector('.cursor-img');
  if (wrap) {
    var cx = -100, cy = -100;
    document.addEventListener('mousemove', function(e) { cx = e.clientX; cy = e.clientY; });
    document.addEventListener('mouseleave', function() { wrap.style.opacity = '0'; });
    document.addEventListener('mouseenter', function() { wrap.style.opacity = '1'; });

    document.querySelectorAll('a,button,.slide,.contact-social a,.sound-toggle,.gate-logo').forEach(function(el) {
      el.addEventListener('mouseenter', function() { wrap.classList.add('hover'); });
      el.addEventListener('mouseleave', function() { wrap.classList.remove('hover'); });
    });

    function tick() {
      wrap.style.left = cx + 'px';
      wrap.style.top = cy + 'px';
      requestAnimationFrame(tick);
    }
    tick();
  }

  /* ===== MAGNETIC ELEMENTS ===== */
  document.querySelectorAll('[data-magnetic]').forEach(function(el) {
    el.addEventListener('mousemove', function(e) {
      var r = el.getBoundingClientRect();
      var ecx = r.left + r.width / 2, ecy = r.top + r.height / 2;
      var dx = (e.clientX - ecx) * .2, dy = (e.clientY - ecy) * .2;
      gsap.to(el, { x: dx, y: dy, duration: .4, ease: 'power2.out' });
    });
    el.addEventListener('mouseleave', function() {
      gsap.to(el, { x: 0, y: 0, duration: .7, ease: 'elastic.out(1,.4)' });
    });
  });

  /* ===== SCROLL ANIMATIONS ===== */
  document.querySelectorAll('.works .slide').forEach(function(slide, i) {
    var img = slide.querySelector('img');
    if (!img) return;
    gsap.set(img, { opacity: 0, y: 40 });
    ScrollTrigger.create({
      trigger: slide,
      start: 'top 95%',
      onEnter: function() { gsap.to(img, { opacity: 1, y: 0, duration: 1.2, ease: 'power3.out', delay: (i % 4) * .06 }); },
      onLeaveBack: function() { gsap.set(img, { opacity: 0, y: 40 }); }
    });
  });

  gsap.from('.contact', { y: 50, autoAlpha: 0, duration: 1.4, ease: 'power3.out', scrollTrigger: { trigger: '.contact', start: 'top 88%' } });

  /* ===== FALLING STICKERS (Physics-based, zero GSAP conflicts) ===== */
  ;(function(){
    var layer = document.getElementById('stickersLayer');
    if (!layer) return;
    var srcs = [];
    for (var i = 1; i <= 13; i++) srcs.push('Stickers/sticker' + i + '.png');
    var heroH = window.innerHeight;
    var spawned = false;
    var mouseX = -9999, mouseY = -9999;
    var particles = [];

    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function spawn() {
      var src = srcs[Math.floor(Math.random() * srcs.length)];
      var el = document.createElement('img');
      el.src = src;
      el.className = 'sticker';
      el.alt = '';
      el.draggable = false;

      var size = 70 + Math.random() * 80;
      el.style.width = size + 'px';
      el.style.height = 'auto';

      layer.appendChild(el);

      particles.push({
        el: el,
        x: (5 + Math.random() * 90) / 100 * window.innerWidth,
        y: -120 - Math.random() * 200,
        vy: 0.15 + Math.random() * 0.25,
        baseX: 0,
        vx: 0,
        swayAmp: 30 + Math.random() * 50,
        swaySpeed: 0.3 + Math.random() * 0.4,
        swayOffset: Math.random() * Math.PI * 2,
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 0.8,
        rotWobble: Math.random() * 1.2,
        opacity: 0,
        targetOpacity: 0.75 + Math.random() * 0.25,
        repelX: 0,
        repelY: 0,
        born: performance.now(),
        size: size
      });
    }

    var lastTime = 0;
    function loop(now) {
      requestAnimationFrame(loop);
      var dt = Math.min((now - lastTime) / 16.67, 3);
      lastTime = now;
      var time = now * 0.001;

      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        var age = (now - p.born) * 0.001;

        /* Fade in */
        if (p.opacity < p.targetOpacity) {
          p.opacity = Math.min(p.opacity + 0.015 * dt, p.targetOpacity);
        }

        /* Fall */
        p.y += p.vy * dt * 1.8;

        /* Sway */
        p.baseX = p.x + Math.sin(time * p.swaySpeed + p.swayOffset) * p.swayAmp;

        /* Rotation */
        p.rotation += p.rotSpeed * dt;
        var wobble = Math.sin(time * p.rotWobble + p.swayOffset) * 15;

        /* Mouse repulsion - smooth, no fighting */
        var cx = p.baseX + p.repelX;
        var cy = p.y + p.repelY;
        var dx = cx - mouseX;
        var dy = cy - mouseY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var repelRadius = 160;

        if (dist < repelRadius && dist > 1) {
          var force = (1 - dist / repelRadius) * 120;
          var angle = Math.atan2(dy, dx);
          p.repelX += Math.cos(angle) * force * 0.03 * dt;
          p.repelY += Math.sin(angle) * force * 0.03 * dt;
        }

        /* Smooth decay of repulsion */
        p.repelX *= 0.96;
        p.repelY *= 0.96;

        /* Apply transform */
        var finalX = p.baseX + p.repelX;
        var finalY = p.y + p.repelY;
        p.el.style.transform = 'translate(' + finalX + 'px,' + finalY + 'px) rotate(' + (p.rotation + wobble) + 'deg)';
        p.el.style.opacity = p.opacity;

        /* Remove when past hero */
        if (p.y > heroH + 200) {
          p.el.remove();
          particles.splice(i, 1);
        }
      }
    }
    requestAnimationFrame(loop);

    /* Spawn stickers at staggered intervals after site enters */
    function startDropping() {
      if (spawned) return;
      spawned = true;

      /* Initial batch */
      for (var i = 0; i < 6; i++) {
        (function(idx) {
          setTimeout(spawn, idx * 500);
        })(i);
      }

      /* Continuous spawning */
      setInterval(function() {
        if (particles.length < 14) spawn();
      }, 2200);
    }

    /* Start after entry gate opens */
    var checkReady = setInterval(function() {
      var gate = document.getElementById('entryGate');
      if (gate && gate.classList.contains('hidden')) {
        clearInterval(checkReady);
        setTimeout(startDropping, 200);
      }
    }, 100);

    /* Cleanup on scroll past hero */
    ScrollTrigger.create({
      trigger: '.hero',
      start: 'top top',
      end: 'bottom top',
      onLeave: function() {
        for (var i = particles.length - 1; i >= 0; i--) {
          particles[i].el.remove();
          particles.splice(i, 1);
        }
      },
      onEnterBack: function() { startDropping(); }
    });
  })();
})();
</script>

<!-- THREE.JS -->
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* ============ SHADERS ============ */
const ChromaticAberrationShader = {
  uniforms: { tDiffuse:{value:null}, amount:{value:.003}, angle:{value:0} },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float amount; uniform float angle; varying vec2 vUv;
    void main(){
      vec2 off=amount*vec2(cos(angle),sin(angle));
      gl_FragColor=vec4(texture2D(tDiffuse,vUv+off).r,texture2D(tDiffuse,vUv).g,texture2D(tDiffuse,vUv-off).b,1.);
    }`
};
const VignetteShader = {
  uniforms: { tDiffuse:{value:null}, darkness:{value:1.3}, offset:{value:1.1} },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float darkness; uniform float offset; varying vec2 vUv;
    void main(){
      vec4 t=texture2D(tDiffuse,vUv); vec2 u=(vUv-.5)*offset;
      t.rgb*=smoothstep(0.,1.,(1.-dot(u,u))*darkness); gl_FragColor=t;
    }`
};
const NoiseShader = {
  uniforms: { tDiffuse:{value:null}, intensity:{value:.03}, time:{value:0} },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float intensity; uniform float time; varying vec2 vUv;
    float r(vec2 c){ return fract(sin(dot(c,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      vec4 t=texture2D(tDiffuse,vUv); float n=r(vUv+fract(time))*intensity;
      t.rgb+=n-intensity*.5; gl_FragColor=t;
    }`
};

/* ============ WEBGL SCENE ============ */
const canvas = document.getElementById('hero-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true, powerPreference:'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050505, .012);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, .1, 200);
camera.position.set(0, 0, 18);

/* Lighting */
scene.add(new THREE.AmbientLight(0xffffff, .15));
const dirLight = new THREE.DirectionalLight(0xFAC752, 1.2);
dirLight.position.set(5, 8, 10);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0xFAC752, 2.5, 40);
pointLight.position.set(0, 2, 8);
scene.add(pointLight);
const rimLight = new THREE.PointLight(0xffffff, .8, 50);
rimLight.position.set(-8, -4, 5);
scene.add(rimLight);

/* Materials */
const goldMat = new THREE.MeshStandardMaterial({ color:0xFAC752, roughness:.25, metalness:.85, transparent:true, opacity:.7 });
const whiteMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:.35, metalness:.7, transparent:true, opacity:.35 });
const darkMat = new THREE.MeshStandardMaterial({ color:0x222222, roughness:.2, metalness:.9, transparent:true, opacity:.5 });
const wireGold = new THREE.MeshBasicMaterial({ color:0xFAC752, wireframe:true, transparent:true, opacity:.12 });
const wireWhite = new THREE.MeshBasicMaterial({ color:0xffffff, wireframe:true, transparent:true, opacity:.06 });

/* Floating objects */
const floatingObjects = [];
[
  { g:new THREE.IcosahedronGeometry(1.4,0), m:goldMat, p:[-6,3,-4], s:.3, f:.8, mi:1.2 },
  { g:new THREE.OctahedronGeometry(1.1,0), m:whiteMat, p:[7,-2,-6], s:.4, f:1.0, mi:1.0 },
  { g:new THREE.TorusKnotGeometry(.7,.22,80,12,2,3), m:goldMat, p:[-3,-4,-8], s:.2, f:.6, mi:.8 },
  { g:new THREE.DodecahedronGeometry(1,0), m:darkMat, p:[4,5,-10], s:.35, f:.9, mi:.6 },
  { g:new THREE.IcosahedronGeometry(2.2,1), m:wireGold, p:[0,0,-12], s:.15, f:1.2, mi:.5 },
  { g:new THREE.TorusGeometry(2,.04,32,100), m:wireWhite, p:[-5,-1,-7], s:.12, f:.5, mi:.9 },
  { g:new THREE.OctahedronGeometry(.6,0), m:goldMat, p:[8,3,-5], s:.5, f:1.1, mi:1.4 },
  { g:new THREE.TetrahedronGeometry(.9,0), m:whiteMat, p:[-8,-3,-9], s:.25, f:.7, mi:.7 },
  { g:new THREE.DodecahedronGeometry(.5,0), m:goldMat, p:[3,-5,-3], s:.45, f:.9, mi:1.3 },
  { g:new THREE.TorusGeometry(1.2,.03,24,80), m:wireGold, p:[6,1,-14], s:.1, f:.4, mi:.4 },
].forEach(cfg => {
  const mesh = new THREE.Mesh(cfg.g, cfg.m);
  mesh.position.set(...cfg.p);
  mesh.userData = { bp:[...cfg.p], speed:cfg.s, amp:cfg.f, mi:cfg.mi, rs:{ x:(Math.random()-.5)*.008, y:(Math.random()-.5)*.008, z:(Math.random()-.5)*.004 } };
  scene.add(mesh);
  floatingObjects.push(mesh);
});

/* Particles */
const pCount = 2000;
const pPos = new Float32Array(pCount*3), pCol = new Float32Array(pCount*3);
for(let i=0;i<pCount;i++){
  pPos[i*3]=(Math.random()-.5)*100; pPos[i*3+1]=(Math.random()-.5)*80; pPos[i*3+2]=(Math.random()-.5)*50-10;
  const c=new THREE.Color().setHSL(.12,.8,.45+Math.random()*.4);
  pCol[i*3]=c.r; pCol[i*3+1]=c.g; pCol[i*3+2]=c.b;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
pGeo.setAttribute('color', new THREE.BufferAttribute(pCol,3));
const pMat = new THREE.PointsMaterial({ size:.05, vertexColors:true, transparent:true, opacity:.4, blending:THREE.AdditiveBlending, sizeAttenuation:true, depthWrite:false });
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

/* Central wireframe */
const cSphere = new THREE.Mesh(
  new THREE.IcosahedronGeometry(4.5,3),
  new THREE.MeshBasicMaterial({ color:0xFAC752, wireframe:true, transparent:true, opacity:.03 })
);
cSphere.position.set(0,0,-16);
scene.add(cSphere);

/* Post-processing */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight), .55, .4, .82);
composer.addPass(bloomPass);
const chromaPass = new ShaderPass(ChromaticAberrationShader);
composer.addPass(chromaPass);
composer.addPass(new ShaderPass(VignetteShader));
const noiseShader = new ShaderPass(NoiseShader);
composer.addPass(noiseShader);
composer.addPass(new OutputPass());

/* Mouse - raw values */
let mx=0, my=0, smx=0, smy=0, mv=0, lmx=0, lmy=0;
document.addEventListener('mousemove', e => { mx=(e.clientX/window.innerWidth)*2-1; my=-(e.clientY/window.innerHeight)*2+1; });

/* Scroll */
let sp = 0;
window.addEventListener('scroll', () => { sp = Math.min(window.scrollY / window.innerHeight, 1); });

/* Camera orbit parameters */
const orbitRadius = 18;
const orbitSpeedX = 0.6;
const orbitSpeedY = 0.4;
const smoothing = 0.035;
let targetRotX = 0, targetRotY = 0;
let currentRotX = 0, currentRotY = 0;

/* Animate */
const clock = new THREE.Clock();
(function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  smx += (mx-smx)*.06; smy += (my-smy)*.06;
  const dx=mx-lmx, dy=my-lmy; mv=Math.sqrt(dx*dx+dy*dy); lmx=mx; lmy=my;

  /* Full 360 orbit — mouse maps to spherical rotation */
  targetRotY = smx * Math.PI * orbitSpeedX;
  targetRotX = smy * Math.PI * orbitSpeedY;

  currentRotX += (targetRotX - currentRotX) * smoothing;
  currentRotY += (targetRotY - currentRotY) * smoothing;

  /* Camera orbits on a sphere around center */
  const camZ = orbitRadius + sp * 8;
  const camY = currentRotX * 8 - sp * 6;
  camera.position.x = Math.sin(currentRotY) * camZ * 0.7;
  camera.position.y = camY;
  camera.position.z = Math.cos(currentRotY * 0.5) * camZ;

  /* Look at a slightly shifted center for depth */
  const lookX = Math.sin(currentRotY * 0.3) * 3;
  const lookY = -sp * 2;
  camera.lookAt(lookX, lookY, -5);

  /* Floating objects — follow orbit gently */
  floatingObjects.forEach(mesh => {
    const u=mesh.userData;
    mesh.position.x = u.bp[0]+Math.sin(currentRotY)*u.mi*2.5;
    mesh.position.y = u.bp[1]+Math.sin(t*u.speed+u.bp[0])*u.amp+currentRotX*u.mi*1.5;
    mesh.position.z = u.bp[2]+Math.cos(t*u.speed*.7+u.bp[1])*.4*u.amp;
    mesh.rotation.x+=u.rs.x; mesh.rotation.y+=u.rs.y; mesh.rotation.z+=u.rs.z;
    const base = mesh.material===goldMat?.7:mesh.material===whiteMat?.35:mesh.material===darkMat?.5:mesh.material===wireGold?.12:.06;
    mesh.material.opacity = base*(1-sp*.8);
  });

  /* Particles rotate with orbit */
  particles.rotation.y = currentRotY * 0.15;
  particles.rotation.x = currentRotX * 0.08;
  pMat.opacity += (.4*(1-sp*.6)-pMat.opacity)*.02;
  cSphere.rotation.x+=.0003; cSphere.rotation.y-=.0004;
  cSphere.material.opacity = .03*(1-sp*.7);

  /* Lights follow orbit */
  pointLight.position.x = Math.sin(currentRotY + 0.5) * 6;
  pointLight.position.y = currentRotX * 3 + 2;
  pointLight.position.z = Math.cos(currentRotY * 0.5) * 8;
  dirLight.position.x = Math.sin(currentRotY - 0.3) * 10;
  dirLight.position.y = currentRotX * 4 + 8;

  bloomPass.strength += (.55+Math.min(mv*8,.35)-bloomPass.strength)*.03;
  chromaPass.uniforms.amount.value = .003+mv*.008;
  chromaPass.uniforms.angle.value = t*.3;
  noiseShader.uniforms.time.value = t;
  composer.render();
})();

/* Resize */
window.addEventListener('resize', () => {
  const w=window.innerWidth, h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h); composer.setSize(w,h); bloomPass.resolution.set(w,h);
});
</script>
